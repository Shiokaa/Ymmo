# Localisation
d-i debian-installer/locale string fr_FR.UTF-8
d-i keyboard-configuration/xkb-keymap select fr

# Réseau
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string unassigned-hostname
d-i netcfg/get_domain string unassigned-domain
d-i netcfg/disable_autoconfig boolean false

# Miroirs APT
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Configuration des comptes
# Root désactivé pour la sécurité, utilisateur 'packer' créé avec sudo
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Utilisateur Packer
d-i passwd/username string packer
# Le mot de passe est 'packer' par défaut, à changer via variables ou provisionnement
d-i passwd/user-password password packer
d-i passwd/user-password-again password packer
d-i user-setup/allow-password-weak boolean true

# Partitionnement (LVM - Standard en production)
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-auto/choose_recipe select atomic
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Sélection des paquets
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string qemu-guest-agent, cloud-init, sudo, curl, ufw, unattended-upgrades, vim, net-tools
d-i pkgsel/upgrade select full-upgrade


# Chargeur de démarrage (Grub)
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

# Éviter l'entrée CD-ROM dans sources.list
d-i apt-setup/cdrom/set-first boolean false

# Configuration de sudo sans mot de passe pour l'utilisateur packer
d-i preseed/late_command string \
    echo 'packer ALL=(ALL) NOPASSWD: ALL' > /target/etc/sudoers.d/packer ; \
    in-target chmod 440 /etc/sudoers.d/packer

# Finalisation
d-i finish-install/reboot_in_progress note
