[defaults]
host_key_checking = False
# Pipelining activé : accélère l'exécution et limite les timeouts de privilege escalation.
# Le contournement TTY est géré côté VM via /etc/sudoers.d/ansible (!requiretty, !use_pty).
pipelining = True
inventory = inventory/
roles_path = roles

[privilege_escalation]
# -H : positionne HOME sur celui de l'utilisateur cible
# -S : lit le mot de passe depuis stdin (compatible Ansible)
# -n : non-interactif, échec immédiat si un mot de passe est requis
#      (évite que sudo reste bloqué en attente et dépasse le timeout become d'Ansible)
become_flags=-H -S -n

[inventory]
enable_plugins = community.proxmox.proxmox, yaml, ini
