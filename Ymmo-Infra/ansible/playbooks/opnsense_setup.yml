---
- name: Configuration initiale de OPNsense
  hosts: tag_router
  gather_facts: false # Pas de Python sur OPNsense (FreeBSD)
  module_defaults:
    group/oxlorg.opnsense.all:
      api_key: "{{ opnsense_api_key }}"
      api_secret: "{{ opnsense_api_secret }}"
      api_host: "{{ opnsense_api_host }}"
      ssl_verify: "{{ opnsense_ssl_verify }}"

  roles:
    - opnsense_bootstrap
