---
# Enregistrement des peers (agences) sur OPNsense.
# Prérequis : le play debian_wireguard (20_keys.yml) doit avoir tourné avant
# pour que le fact wg_pubkey soit disponible sur chaque VM agence.
# L'orchestrateur wireguard.yml garantit cet ordre d'exécution.

- name: "WireGuard | Vérifier que les clés publiques des agences sont disponibles"
  ansible.builtin.assert:
    that:
      # Vérifier d'abord que le host existe dans l'inventaire avant d'accéder à ses facts.
      # Accéder directement à ['wg_pubkey'] sur un host absent lève un KeyError non explicite.
      - hostvars[item.inventory_hostname] is defined
      - hostvars[item.inventory_hostname]['wg_pubkey'] is defined
    fail_msg: >-
      La clé publique de {{ item.inventory_hostname }} est introuvable.
      Vérifier que le host existe dans l'inventaire Proxmox (tag ymmotom présent ?)
      et que le play 'debian_wireguard - génération des clés' a bien été exécuté.
    success_msg: "Clé publique de {{ item.name }} disponible."
  loop: "{{ wireguard_peers }}"
  loop_control:
    label: "{{ item.name }}"

- name: "WireGuard | Enregistrer les peers agences sur OPNsense"
  oxlorg.opnsense.wireguard_peer:
    name: "{{ item.name }}"
    # Paramètre correct : public_key (pas pub_key).
    # Source : https://ansible-opnsense.oxl.app/modules/wireguard.html
    public_key: "{{ hostvars[item.inventory_hostname]['wg_pubkey'] }}"
    # allowed_ips regroupe l'IP tunnel (/32) ET le réseau de l'agence.
    # OPNsense route vers ce peer tout trafic correspondant à cette liste.
    # tunnel_addresses n'existe pas dans le module — c'était un paramètre incorrect.
    allowed_ips:
      - "{{ item.tunnel_ip }}"
      - "{{ item.allowed_ips }}"
    # servers lie ce peer à l'instance serveur WireGuard côté OPNsense.
    servers:
      - "{{ wireguard_server_name }}"
    state: present
  loop: "{{ wireguard_peers }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

# Recharge le service WireGuard pour que les peers fraîchement enregistrés soient
# pris en compte par l'interface wg0 EN COURS D'EXÉCUTION. Sans ce reconfigure,
# OPNsense conserve les peers en configuration mais ne les charge pas dans le tunnel
# actif : le handshake bastion↔OPNsense n'a pas lieu et les VMs internes (DC, Webapp)
# restent injoignables via le ProxyJump — d'où le « Connection closed by UNKNOWN
# port 65535 » au démarrage de samba4/webapp dans full-deploy.
- name: "WireGuard | Recharger le service WireGuard (appliquer les peers)"
  ansible.builtin.uri:
    url: "https://{{ opnsense_api_host }}/api/wireguard/service/reconfigure"
    method: POST
    url_username: "{{ opnsense_api_key }}"
    url_password: "{{ opnsense_api_secret }}"
    validate_certs: "{{ opnsense_ssl_verify }}"
    force_basic_auth: true
    status_code: 200
  changed_when: false
